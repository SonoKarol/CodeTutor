<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Tutor — il chatbot che ti spiega il codice</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Rendering markdown + sanitizzazione + syntax highlighting (da CDN) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="logo">&lt;/&gt;</span>
        <div>
          <h1>Code Tutor</h1>
          <p class="tagline">Genera codice e te lo spiega passo passo</p>
        </div>
      </div>
    </header>

    <main id="chat" class="chat" aria-live="polite">
      <div class="welcome" id="welcome">
        <h2>Ciao! 👋</h2>
        <p>
          Chiedimi qualsiasi cosa sulla programmazione: dalla tua prima pagina
          web fino al C di basso livello. Ti darò il codice e te lo spiegherò
          nel dettaglio.
        </p>
        <div class="suggestions">
          <button class="suggestion">Come faccio una pagina web con un pulsante?</button>
          <button class="suggestion">Spiegami i puntatori in C con un esempio</button>
          <button class="suggestion">Scrivi una funzione Python che ordina una lista</button>
        </div>
      </div>
    </main>

    <form id="composer" class="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="Scrivi la tua domanda... (Invio per inviare, Shift+Invio per andare a capo)"
        autocomplete="off"
      ></textarea>
      <button id="send" type="submit" title="Invia">➤</button>
    </form>

    <script src="app.js"></script>
  </body>
</html>
